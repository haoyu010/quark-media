name: build-and-push

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump patch version
        id: ver
        run: |
          if [ -f VERSION ]; then V=$(cat VERSION | tr -d "\r\n"); else V=0.1.0; fi
          MAJOR=$(echo $V | cut -d. -f1)
          MINOR=$(echo $V | cut -d. -f2)
          PATCH=$(echo $V | cut -d. -f3)
          PATCH=$((PATCH+1))
          NEW="$MAJOR.$MINOR.$PATCH"
          echo "$NEW" > VERSION
          echo "version=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --cached --quiet || git commit -m "chore: bump version to ${{ steps.ver.outputs.version }}"
          git push || true
          git tag -f "${{ steps.ver.outputs.tag }}" || true
          git push -f origin "${{ steps.ver.outputs.tag }}" || true

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/haoyu010/quark-media:latest
            ghcr.io/haoyu010/quark-media:${{ steps.ver.outputs.version }}
            ghcr.io/haoyu010/quark-media:${{ steps.ver.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
